name: chatapp
description: ChatApp — Modern, fast and secure messaging for everyone.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.3
  http: ^1.1.0
  shared_preferences: ^2.2.2
  file_picker: ^11.0.2
  image_picker: ^1.0.4
  record: ^6.2.0
  audioplayers: ^6.6.0
  cached_network_image: ^3.3.0
  intl: ^0.20.2
  permission_handler: ^12.0.1
  path_provider: ^2.1.1
  mime: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
